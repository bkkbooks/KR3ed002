body:
  text: 卷六治目赤痛暗昧刺諸病方第四十三華他禁方令病人自用手兩指擘所患眼垂空咒之曰匹匹屋舍狹窄不容宿客即出也傷寒方末亦有眼方姚方目中冷淚出眥赤癢乳汁煎方黃連三分蕤仁二分乾薑四分以乳汁一升漬一宿微火煎取三合去滓取米大敷眥睛為所傷損破方牛旋日二點避風黑睛破亦瘥附方範注方主目中淚出不得開即刺痛方以鹽如大豆許納目中習習去鹽以冷水數洗目瘥博濟方治風毒上攻眼腫癢澀痛不可忍者或上下臉眥赤爛浮翳瘀肉侵睛神效驅風散五倍子一兩蔓荊子一兩半同杵末每服二錢水二盞銅石器內煎及一盞澄滓熱淋洗留滓二服又依前煎淋洗大能明眼目去澀癢簡要濟衆治肝虛目睛疼冷淚不止筋脈痛及眼羞明怕日補肝散夏枯草半兩香附子一兩共為末每服一錢蠟茶調下無時聖惠方治眼癢急赤澀用犬膽汁注目中又方治風赤眼以地龍十條炙乾為末夜臥以冷茶調下二錢匕又方治傷寒熱毒氣攻眼生白翳用烏賊魚骨二兩不用大皮杵末入龍腦少許更研令細日三四度取少許點之又方治久患內障眼車前子乾地黃麥門冬等分為末蜜丸如梧桐子大服屢效治目方用黃連多矣而羊肝丸尤奇異取黃連末一大兩白羊子肝一具去膜同於砂盆內研令極細衆手捻為丸如梧桐子每食以暖漿水吞二七枚連作五劑瘥但是諸眼目疾及障翳青盲皆主之禁食豬肉及冷水劉禹錫云有崔承元者因官治一死罪囚出活之因後數年以病自致死一旦崔為內障所苦喪明逾年後半夜嘆息獨坐時聞階除間悉窣之聲崔問為誰曰是昔所蒙活者囚今故報恩至此遂以此方告訖而沒崔依此合服不數月眼復明因傳此方於世又方今翳家洗眼湯以當歸芍藥黃連等分停細以雪水或甜水煎濃汁乘熱洗冷即再溫洗甚益眼目但是風毒赤目花翳等皆可用之其說云凡眼目之病皆以血脈凝滯使然故以行血藥合黃連治之血得熱即行故乘熱洗之用者無不神效又方治雀目不計時月用蒼朮二兩搗羅為散每服一錢不計時候以好羊子肝一個用竹刀子批破糝藥在內麻繩纏定以粟米泔一大盞煮熟為度患人先熏眼藥氣絶即吃之簡要濟衆治小兒雀目梅師方治目暗黃昏不見物者以青羊肝切淡醋食之煮亦佳又方治眼睛無故突一二寸者以新汲水灌漬睛中數易水睛自入崔元亮海上方著此三名一名西國草一名畢楞伽一名覆盆子治眼暗不見物冷淚浸淫不止及青盲天行目暗等取西國草日曝乾搗令極爛薄綿裹之以飲男乳汁中浸如人行八九里久用點目中即仰臥不過三四日視物如少年禁酒油麵千金方點小兒黑花眼翳澀痛用貝齒一兩燒作灰研如面入少龍腦點之妙又方常服明目洞視胡麻一石蒸之三十遍末酒服每日一升又方古方明目黑髮槐子於牛膽中漬陰乾百日食後吞一枚十日身輕三十日白髮黑百日內通神孫真人食忌主眼有翳取芒硝一大兩置銅器中急火上煉之放冷後以生絹細羅點眼角中每夜欲臥時一度點妙經驗方退翳明目白龍散馬牙硝光淨者用厚紙裹令按實安在懷內著肉處養一百二十日取出研如粉入少龍腦同研細不計年歲深遠眼內生翳膜漸漸昏暗遠視不明但瞳仁不破散並醫得每點用藥末兩米許點目中又方治內外障眼蒼朮四兩米泔浸七日逐日換水後刮去黑皮細切入青鹽一兩同炒黃色為度去鹽不用木賊二兩以童子小便浸一宿水淘焙乾同搗為末每日不計時候但飲食蔬菜納調下一錢匕服甚驗經驗後方治虛勞眼暗採三月蔓荊花陰乾為末以井花水每空心調下二錢匕久服長生可讀夜書外臺祕要主目翳及胬肉用礬石最白者納一黍米大於翳上及胬肉上即冷淚出綿拭之令惡汁盡其疾日日減翳自消薄便瘥礬石須真白好者方可使用又補肝散治三十年失明蒺藜子七月七日收陰乾搗散食後水服方寸匕又療盲豬膽一枚微火上煎之可丸如黍米大納眼中食頃良又方治翳如重者取豬膽白皮曝乾合作小繩子如粗叉股大小燒作灰待冷便以灰點翳上不過三五度即瘥又方輕身益氣明目蕪菁子一升水九升煮令汁盡曬乾如此三度搗末水服方寸匕日三斗門方治火眼用艾燒令煙起以碗蓋之候煙上碗成煤取下用溫水調化洗火眼即瘥更入黃連甚妙廣利方治眼築損胬肉出生杏仁七枚去皮細嚼吐於掌中及熱以綿裹筋頭將點胬肉上不過四五度瘥藥性論云空心用鹽揩齒少時吐水中洗眼夜見小字良顧含養嫂失明含嘗藥視膳不冠不食嫂目疾須用蚺蛇膽含計盡求不得有一童子以一合授含含開乃蚺蛇膽也童子出門化為青鳥而去嫂目遂瘥治卒耳聾諸病方第四十七葛氏耳卒聾取鼠膽納耳內不過三愈有人云側臥瀝一膽盡須臾膽汁從下邊出初出益聾半日頃乃瘥治三十年老聾又方巴豆十四枚搗鵝脂半兩火熔納巴豆和取如小豆綿裹納耳中瘥日一易姚云瘥三十年聾若卒得風覺耳中恍恍者急取鹽七升甑蒸使熱以耳枕鹽上冷復易亦療耳卒疼痛蒸尉又方栝蔞根削令可入耳以臘月豬脂煎三沸出塞耳每日作三七日即愈姚氏耳痛有汁出方熬杏仁令赤黑搗如膏以綿裹塞耳日三易三日即愈聤耳耳中痛膿血出方月下灰吹滿耳令深入無苦即自出耳聾菖蒲根丸菖蒲根一寸巴豆一粒去皮心二物合搗篩分作七丸綿裹臥即塞夜易之十日立愈黃汁立瘥耳中膿血出方細附子末以蔥涕和灌耳中良單蔥涕亦佳側耳令入耳耳中常鳴方生地黃切以塞耳日十數易小品療聤耳出膿汁散方礬石二兩燒黃連一兩烏賊魚骨一兩三物為散即如棗核大綿裹塞耳日再易更加龍骨耳聾巴豆丸巴豆一枚去心皮斑蝥一枚去翅足二物合搗篩綿裹塞耳中再易甚驗云此來所用則良又方磁石菖蒲通草薰陸香杏仁萆麻松脂搗篩為末分等蠟及鵝脂和硬和為丸稍長用叉子穿心為孔先去耳塞然後納於藥日再初著癢及作聲月餘總瘥殿中侯監效耳卒痛蒸鹽尉之痛不可忍求死者菖蒲附子各一分末和烏麻油煉點耳中則立止聤耳膿血出車轄脂塞耳中膿血出盡愈附方肘後方療耳卒腫出膿水方礬石燒末以筆管吹耳內日三四度或以綿裹塞耳中立瘥經驗方治底耳方用桑螵蛸一個慢火炙及八分熟存性細研入麝香一字為末糝在耳內每用半字如神效如有膿先用綿包子捻去次後糝藥末入耳內又方治耳卒聾巴豆一粒蠟裹針刺令通透用塞耳中梅師方治耳久聾松脂三兩煉巴豆一兩相和熟搗可丸通過以薄綿裹納耳孔中塞之日一度易聖惠方治腎氣虛損耳聾用鹿腎一對去脂膜切於豉汁中入粳米二合和煮粥入五味之法調和空腹令之作羹及酒並得杜壬方治耳聾因腎虛所致十年內一服愈蠍至小者四十九枚生薑如蠍大四十九片二物銅器內炒至生薑干為度為末都作一服初夜溫酒下至二更盡儘量飲酒至醉不妨次日耳中如笙簧即效勝金方治耳聾立效以乾地龍入鹽貯在蔥尾內為水點之千金方治耳聾以雄黃硫黃等分為末綿裹塞耳中又方酒三升漬牡荊子一升碎之浸七日去滓任性服盡三十年聾瘥又方以醇酢微火煎附子削令尖塞耳效外臺祕要治聾芥子搗碎以人乳調和綿裹塞耳瘥楊氏産乳方療耳鳴無晝夜烏頭燒作灰菖蒲等分為末綿裹塞耳中日再用效治耳為百蟲雜物所入方第四十八葛氏百蟲入耳以好酒灌之起行自出又方閉氣令人以蘆吹一耳又方以桃葉塞兩耳立出蜈蚣入耳以樹葉裹鹽灰令熱以掩耳冷復易立出蚰蜒入耳熬胡麻以葛囊貯枕之蟲聞香即自出蟻入耳炙豬脂香物安耳孔邊即自出神效方蚰蜒入耳以牛酪灌滿耳蚰蜒即出出當半銷若入腹中空腹食好酪一二升即化為黃水而出不盡更作服手用神驗無比此方是近得又方小雞一隻去毛足以油煎令黃箸穿作孔枕之又方取蚯蚓納蔥葉中並化為水滴入耳中蚰蜒亦化為水矣附方勝金方主百蟲入耳不出以雞冠血滴入耳內即出又千金方搗韭汁灌耳中瘥又方治耳中有物不可出以麻繩剪令頭散敷好膠著耳中物上黏之令相著徐徐引之令出又梅師方取車釭脂塗耳孔中自出續十全方治蟲入耳秦椒末一錢醋半盞浸良久少少灌耳蟲自出外臺祕要肘後治蟻入耳燒鯪鯉甲末以水調灌之即出劉禹錫傳信方治蚰蜒入耳以麻油作煎餅枕臥須臾蚰蜒自出而瘥李元淳尚書在河陽日蚰蜒入耳無計可為半月後腦中洪洪有聲腦悶不可徹至以頭自擊門柱奏疾狀危極因發御藥以療之無瘥者為受苦不念生存忽有人獻此方乃愈兵部手集治蚰蜒入耳小蒜汁理一切蟲入耳皆同錢相公篋中方治百節蚰蜒並蟻入耳以苦醋注之起行即出聖惠方治飛蛾入耳醬汁灌入耳即出又擊銅器於耳旁經驗方治水入耳以薄荷汁點立效治卒食噎不下方第四十九葛氏方取少蜜含之即立下又方取老牛涎沫如棗核大置水中飲之終身不復患噎也附方外臺祕要治噎羚羊角屑一物多少自在末之飲服方寸匕亦可以角摩噎上良食醫心鏡治卒食噎以陳皮一兩湯浸去穰焙為末以水一大盞煎取半盞熱服聖惠方治膈氣咽喉噎塞飲食不下用碓觜上細糠蜜丸彈子大非時含一丸咽津廣五行記云永徽中絳州僧病噎不下食告弟子吾死之後便可開吾胸喉視有何物言終而卒弟子依言而開視胸中得一物形似魚而有兩頭遍身是肉鱗弟子置器中跳躍不止戲以諸味皆隨化盡時夏中藍多作澱有一僧以澱置器中此蟲遂繞器中走須臾化為水治卒諸雜物鯁不下方第五十食諸魚骨鯁以魚骨於頭上立即愈下云謦咳即出又方小嚼薤白令柔以繩系中持繩端吞薤到鯁處引之鯁當隨出療骨鯁仍取所餘者骨左右手反覆擲背後立出雜物鯁方解衣帶目窺下部不下即出又方好蜜以匕抄稍稍咽之令下魚骨鯁在喉中衆法不能去者方取飴糖丸如雞子黃大吞之不去又吞以漸大作丸用得效附方斗門方治骨鯁用鹿角為末含津咽下妙外臺祕要療鯁取虎骨為末水服方寸匕又方螻蛄腦一物吞亦治刺不出敷之刺即出又方口稱鸕鷀則下又古今録驗療魚鯁骨橫喉中六七日不出取鯉魚鱗皮合燒作屑以水服之則出未出更服勝金方治小兒大人一切骨鯁或竹木簽刺喉中不下方於臘月中取鱖魚膽懸北檐下令乾每魚鯁即取一皂子許以酒煎化溫溫呷若得逆便吐骨即隨頑涎出若未吐更吃溫酒但以吐為妙酒即隨性量力也若未出更煎一塊子無不出者此藥但是鯁物在臟腑中日久痛黃瘦甚者服之皆出若卒求鱖魚不得蠡魚鯇魚鯽魚俱可臘月收之甚佳孟詵云人患卒啞取杏仁三分去皮尖熬別杵桂一分和如泥取李核用綿裹含細細咽之日五夜三治卒誤吞諸物及患方第五十一葛氏誤吞叉方取薤曝令萎煮使熟勿切食一大束叉即隨出生麥菜若節縷皆可用誤吞釘及箭金針錢鐵等物方多食肥羊脂諸般肥肉等自裹之必得出吞諸珠璫鐵而鯁方燒弩銅令赤納水中飲其汁立愈誤吞錢燒火炭末服方寸匕即出小品同又方服蜜三升即出姚氏食中吞發繞喉不出方取梳頭髮燒作灰服一錢匕吞鐶若指彄燒鵝羽數枚末飲之吞錢臘月米餳頓服半升又方濃煎艾汁服效附方聖惠方治誤吞銀鐶子叉子以水銀半兩服之再服即出又方治小兒誤吞針用磁石如棗核大磨令光鑽作竅絲穿令含針自出又方治小兒誤吞銅鐵物在咽喉內不下用南燭根燒細研熟水調一錢下之鐵相公篋中方療誤吞錢以磁石棗許大一塊含之立出又方取艾蒿一把細銼用水五升煎取一升頓服便下又外臺祕要取飴糖一斤漸漸盡食之鐶及叉便出又楊氏産乳葈耳頭一把以水一升浸水中十餘度飲水愈孫用和方治誤吞金銀或錢在腹內不下方石灰一杏核大硫黃一皂子大同研為末酒調下不計時候姚氏方治食中誤吞發繞喉不出取已頭亂髮燒作灰服一錢匕水調陳藏器云故鋸無毒主誤吞竹木入喉咽出入不得者燒令赤漬酒中及熱飲並得治面皰發禿身臭心惛鄙醜方第五十二葛氏療年少氣充面生疱瘡胡粉水銀臘月豬脂和熟研令水銀消散向暝以粉面曉拭去勿水洗至暝又塗之三度即瘥姚方同又方塗麋脂即瘥又方三歲苦酒漬雞子三宿軟取白以塗上隱居效方疱瘡方黃連牡蠣各二兩二物搗篩和水作泥封瘡上濃汁粉之神驗冬葵散冬葵子柏子仁茯苓瓜瓣各一兩四物為散食後服方寸匕日三酒下之療面及鼻酒渣方真珠胡粉水銀分等豬脂和塗又鸕鷀屎和臘月豬脂塗亦大驗神效面多䵟𪒟或似雀卵色者苦酒煮術常以拭面稍稍自去又方新生雞子一枚穿去其黃以朱末一兩納中漆固別方云蠟塞以雞伏著例出取塗面立去而白又別方出西王母枕中陳朝張貴妃常用膏方雞子一枚丹砂二兩末之仍云安白雞腹下伏之余同雞子令麵皮急而光滑丹砂發紅色不過五度敷面面白如玉光潤照人大佳卒病餘面如米粉敷者熬礬石酒和塗之姚云不過三度又方白蘞二分杏仁半分雞屎白一分搗下以蜜和之雜水以拭面良療人頭面患癧瘍方雄黃硫黃礬石末豬脂和塗之又方取生樹木孔中蚛汁拭之末桂和敷上日再三又方蛇蛻皮熟以磨之數百度令熱乃棄草中勿顧療人面體黎黑膚色粗陋皮厚狀醜細搗羚羊脛骨雞子白和敷面乾以白梁米泔汁洗之三日如素神效又方蕪菁子二兩杏仁一兩並搗破栝蔞去子囊豬胰五具淳酒和夜敷之寒月以為手面膏別方云老者少黑者白亦可加土菰根一兩大棗七枚日漸白悅姚方豬胰五具神驗隱居效驗方面黑令白去黯方烏賊魚骨細辛栝蔞乾薑椒各二兩五物切以苦酒漬三日以成煉牛髓二斤煎之苦酒氣盡藥成以粉面醜人特異鮮好神妙方又令面白如玉色方羊脂狗脂各一升白芷半升甘草七尺半夏半兩烏喙十四枚合煎以白器成塗面二十日即變兄弟不相識何況餘人乎傳效方療化面方真珠屑光明砂並別熟研冬菰含人各二兩亦研水銀四兩以四五重帛練袋子貯之銅鐺中醋漿微火煮之一宿一日堪用取水銀和麵脂熟研使消乃合珠屑砂並菰子末更合調然後敷面又療人面無光潤黑䵟及皺常敷面脂方細辛葳蕤黃耆薯蕷白附子辛夷芎藭白芷各一兩栝蔞木蘭皮各一分成煉豬脂二升十一物切之以綿裹用少酒漬之一宿納豬脂煎之七上七下別出一片白芷納煎候白芷黃色成去滓絞用汁以敷面千金不傳此膏亦療金瘡並吐血療人䵟令人面皮薄如蕣華方鹿角尖取實白處於平石上以磨之稍濃取一大兩乾薑一大兩搗密絹篩和鹿角汁攪使調勻每夜先以暖漿水洗面軟帛拭之以白蜜塗面以手拍使蜜盡手指不黏為盡然後塗藥平旦還以暖漿水洗二三七日顏色驚人塗藥不見風日慎之又面上暴生䵟方生杏仁去皮搗以雞子白和如煎餅面入夜洗面干塗之旦以水洗之立愈姚方云經宿拭去面上𪿨礨子化面並療仍得光潤皮急方土菰根搗篩以漿水和令調勻入夜漿水以洗面塗藥旦復洗之百日光華射人夫妻不相識葛氏服藥取白方取三樹桃花陰乾末之食前服方寸匕日三姚云並細腰身又方白菰子中仁五分白楊皮二分桃花四分搗末食後服方寸匕日三欲白加菰子欲赤加桃花三十日面白五十日手足俱白又一方有橘皮三分無楊皮又方女苑三分鉛丹一分末以醋漿服一刀圭日三服十日大便黑十八十九日如漆二十一日全白便止過此太白其年過三十難復療服藥忌五辛又方朱丹五兩桃花三兩末井朝水服方寸匕日三服十日知二十日太白小便當出黑汁又方白松脂十分乾地黃九分乾漆五分熬附子一分炮桂心二分搗下篩蜜丸服十丸日三諸蟲悉出便肥白又方乾薑桂甘草分等末之且以生雞子一枚納一升酒中攪溫以服方寸匕十日知一月白光潤又方去黑羊膽豬胰細辛等分煎三沸塗面靨旦醋漿洗之又方茯苓白石脂分等蜜和塗之日三度服一種藥一月即得肥白方大豆黃炒舂如作醬滓取純黃一大升搗篩煉豬脂和令熟丸酒服二十丸日再漸加至三四十丸服盡五升不出一月即大能食肥白試用之療人須鬢禿落不生長方麻子仁三升秦椒二合置泔汁中一宿去滓日一沐一月長二尺也又方蔓荊子三分附子二枚碎酒七升合煮器中封二七日澤沐十日長一尺勿近面上恐有毛生又方桑白皮銼三二升以水淹煮五六沸去滓以洗須鬢數數為之即自不落又方麻子仁三升白桐葉一把米泔煮五六沸去滓以洗之數之則長又方東行桑根長三尺中央當甑飯上蒸之承取兩頭汁以塗須鬢則立愈療須鬢黃方燒梧桐灰乳汁和以塗膚及須鬢佳染髮須白令黑方醋漿煮豆漆之黑如漆色又方先洗鬚髮令淨取石灰胡粉分等漿和溫夕臥塗訖用油衣包裹明日洗去便黑大佳又拔白毛令黑毛生方拔去白色以好白蜜任孔中即生黑毛眉中無毛亦針挑傷敷蜜亦毛生比見諸人水取石子研丁香汁拔訖急手敷孔中亦即生黑毛此法大神驗若頭風白屑撿風條中方脂澤等方在此篇末姚方療䵟白蜜和茯苓塗上滿七日即愈又療面上粉刺方搗生菟絲絞取汁塗之不過三五上又黑麵方牯羊膽牛膽淳酒三升合煮三沸以塗面良面上惡瘡方黃連黃柏胡粉各五兩下篩以粉面上瘡瘡方並出本條中患宜撿用之葛氏療身體及腋下狐臭方正旦以小便洗腋下即不臭姚云大神驗又方燒好礬石作末絹囊貯常以粉腋下又用馬齒礬石燒令汁盡粉之即瘥又方青木香二兩附子一兩石灰一兩細末著粉腋中汁出即粉之姚方有礬石半兩燒又方炊飯及熱丸以拭腋下臭仍與犬食之七日一如此即瘥又方煮兩雞子熟去殼皮各納腋下冷棄三路口勿反顧三為之良姚方取牛脂胡粉合椒以塗腋下一宿即愈可三兩度作之則永瘥又兩腋下及手足掌陰下股里常汗濕致臭方干枸杞根干畜根甘草半兩干商陸胡粉滑石各一兩六物以苦酒和塗腋下當汁出易衣更塗不過三敷便愈或更發復塗之不可多敷傷人腋余處亦塗之若股內陰下常濕且臭或作瘡者方但以胡粉一分粉之即瘥常用驗方隱居效方療狐臭雞舌藿香青木香胡粉各二兩為散納腋下綿裹之常作瘥令人香方白芷薰草杜若杜蘅藁本分等蜜丸為丸但旦服三丸暮服四丸二十日足下悉香云大神驗又方瓜子芎藭藁本當歸杜蘅細辛各二分白芷桂各五分搗下食後服方寸匕日三服五日口香一十日肉中皆香神良小品又方甘草松樹根及皮大棗甜瓜子四物分等末服方寸匕日三二十日覺效五十日身體並香百日衣服床幃皆香姚同療人心孔惛塞多忘喜誤七月七日取蜘蛛網著領中勿令人知則永不忘也姚方同又方丁酉日密自至市買遠志著巾角中還末服之勿令人知姚同又方丙午日取鱉甲著衣帶上良又方取牛馬豬雞心干之末向日酒服方寸匕日三問一知十孔子大聖智枕中方已出在第九卷姚同又方茯苓茯神人參五分遠志七分菖蒲二分末服方寸匕日三夜一服又方商陸花陰乾一百日搗末暮水服方寸匕暮臥思念所欲知事即於眠中醒悟又方上黨人參半斤七月七日麻勃一升合搗蒸使氣盡遍服一刀圭暮臥逆知未然之事療人嗜眠喜睡方馬頭骨燒作灰末服方寸匕日三夜一又方父鼠目一枚燒作屑魚膏和注目外眥則不肯眠兼取兩目絳囊裹帶又方麻黃術各五分甘草三分日中南搗末服一方寸匕日三姚方人不忘又方菖蒲三分茯苓五分伏神人參各五分遠志七分末服方寸匕日三夜一五日則知神良傳用方頭不光澤臘澤飾發方青木香白芷零陵香甘松香澤蘭各一分用綿裹酒漬再宿內油里煎再宿加臘澤斟量硬軟即火急煎著少許胡粉胭脂訖又緩火煎令黏極去滓作梃以飾發神良作香澤塗發方依臘澤藥內漬油里煎即用塗發亦綿裹煎之作手脂法豬胰一具白芷桃仁碎各一兩辛夷各二分冬菰仁二分細辛半分黃菰栝蔞人各三分以油一大升煮白芷等二三沸去滓挼豬胰取盡乃內冬菰桃仁末合和之膏成以塗手掌即光蓽豆香藻法蓽豆一升白附芎藭白芍藥水栝蔞當陸桃仁冬菰人各二兩搗篩和合先用水洗手面然後敷藥粉飾之也六味薰衣香方沉香一片麝香一兩蘇合香蜜塗微火炙少令變色白膠香一兩搗沉香令破如大豆粒丁香一兩亦別搗令作三兩段搗餘香訖蜜和為炷燒之若薰衣著半兩許又藿香一兩佳葛氏既有膏敷面染髮等方故疏脂澤等法亦粉飾之所要云發生方蔓荊子三分附子二枚生用並碎之二物以酒七升和內瓷器中封閉經二七日藥成先以灰汁淨洗鬚髮痛拭乾取烏雞脂揩一日三遍凡經七日然後以藥塗日三四遍四十日長一尺余處則勿塗附方肘後方姚氏療䵟茯苓末白蜜和塗上滿七日即愈又方療面多䵟黯如雀卵色以羚羊膽一枚酒二升合煮三沸以塗拭之日三度瘥千金方治血䵟面皺取蔓荊子爛研入常用面脂中良崔元亮海上方滅瘢膏以黃礬石燒令汁出胡粉炒令黃各八分惟須細研以臘月豬脂和更研如泥先取生布揩令痛則用藥塗五度又取鷹屎白燕窠中草燒作灰等分和人乳塗之其瘢自滅肉平如故又方治面䵟黑子取李核中仁去皮細研以雞子白和如稀餳塗至晚每以淡漿洗之後塗胡粉不過五六日有神慎風孫真人食忌去黶子取石灰炭上熬令熱插糯米於灰上候米化即取米點之外臺祕要救急去黑子方夜以暖漿水洗面以布揩黑子令赤痛水研白檀香取濃汁以塗之旦又復以漿水洗面仍以鷹糞粉黑子又令面生光方以密陀僧用乳煎塗面佳兼治㾴鼻皰聖惠方治䵟𪒟斑點方用密陀僧二兩細研以人乳汁調塗面每夜用之又方治黑痣生於身面上用藜蘆灰五兩水一大碗淋灰汁於銅器中貯以重湯煮令如黑膏以針微撥破痣處點之良不過三遍神驗又方生眉毛用七月烏麻花陰乾為末生烏麻油浸每夜敷之千金翼老人令面光澤方大豬蹄一具洗淨理如食法煮漿如膠夜以塗面曉以漿水洗面皮澤矣談氏小兒方療豆瘡瘢面黶以密陀僧細研水調夜塗之明旦洗去平復矣有治癧瘍三方具風條中千金方治諸腋臭伏龍肝澆作泥敷之立瘥外臺祕要治狐臭若股內陰下恆濕臭或作瘡青木香好醋浸致腋下夾之即愈又生狐臭以三年釅醋和石灰敷之經驗方善治狐臭用生薑塗腋下絶根本又方烏髭鬢駐顏色壯筋骨明耳目除風氣潤肌膚久服令人輕健蒼朮不計多少用米泔水浸三兩日逐日換水候滿日即出刮去黑皮切作片子曝乾用慢火炒令黃色細搗末每一斤末用蒸過茯苓半斤煉蜜為丸如梧桐子大空心臥時溫熟水下十五丸別用術末六兩甘草末一兩拌和勻作湯點之下術丸妙忌桃李雀蛤及三白千金方治發落不生令長麻子一升熬黑壓油以敷頭長髮妙又治發不生以羊屎灰淋取汁洗之三日一洗不過十度即生又治眉發髭落石灰三升以水拌勻焰火炒令焦以絹袋貯使好酒一斗漬之密封冬十四日春秋七日取服一合常令酒氣相接嚴云百日即新髭發生不落孫真人食忌生髮方取側柏葉陰乾作末和油塗之又方令髮鬢烏黑醋煮大豆黑者去豆煎令稠敷發又方治頭禿蕪菁子末酢和敷之日三梅師方治年少發白拔去白髮以白蜜塗毛孔中即生黑者發不生取梧桐子搗汁塗上必生黑者千金翼療發黃熊脂塗發梳之散頭入床底伏地一食頃即出便盡黑不過一升脂驗楊氏産乳療白禿瘡及發中生癬取熊白敷之又療禿瘡取虎膏塗之聖惠方治白禿以白鴿糞搗細羅為散先以醋米泔洗了敷之立瘥又治頭赤禿用白馬蹄燒灰末以臘月豬脂和敷之簡要濟衆治頭瘡大筍殼葉燒為灰量瘡大小用灰調生油敷入少膩粉佳
