front:
  text: 葛洪肘後備急方序醫有方古也古以來著方書者無慮數十百家其方殆未可以數計篇帙浩瀚苟無良醫師安所適從況窮鄉遠地有病無醫有方無藥其不罹夭折者幾希丹陽葛稚川夷考古今醫家之説驗其方簡要易得針灸分寸易曉必可以救人於死者為肘後備急方使有病者得之雖無韓伯休家自有藥雖無封君達人可為醫其以備急固宜華陽陶弘景曰葛之此制利世實多但行之既久不無謬誤乃著百一方疏於備急之後訛者正之缺者補之附以炮製服食諸法纖悉備具仍區別內外他犯為三條可不費討尋開卷見病其以備急益宜葛陶二君世共知為有道之士於學無所不貫於朮無所不通然猶積年僅成此編蓋一方一論已試而後録之非徒採其簡易而已人能家置一帙遇病得方方必已病如歷卞和之肆舉皆美玉入伯樂之廄無非駿足可以易而忽之邪葛自序云人能起信可免夭橫意可見矣自天地大變此方湮沒幾絶間一存者閟以自寶是豈制方本意連帥烏侯夙多疹疾宦學之餘留心於醫藥前按察河南北道得此方於平鄉郭氏郭之婦翁得諸汴之掖庭變亂之際與身存亡未嘗輕以示人逮今而出焉天也侯命上刻之以趣其成唯恐病者見方之晚也雖然方之顯晦而人之生死休戚系焉出自有時而隱痛惻怛如是其急者不忍人之心也有不忍人之心斯有不忍人之政矣則侯之仁斯民也豈直一方書而已乎方之出乃吾仁心之發見者也因以序見命特書其始末以告夫未知者至元丙子季秋稷亭段成巳題葛洪肘後備急方序亦名肘後卒救方隱居又名百一方抱朴子丹陽葛稚川曰余既窮覽墳索以著述餘暇兼綜術數省仲景元化劉戴祕要金匱緑秩黃素方近將千卷患其混雜煩重有求難得故周流華夏九州之中收拾奇異捃拾遺逸選而集之便種類殊分緩急易簡凡為百卷名曰玉函然非有力不能盡寫又見周甘唐阮諸家各作備急既不能窮諸病狀兼多珍貴之藥豈貧家野居所能立辦又使人用針自非究習醫方素識明堂流注者則身中榮衛尚不知其所在安能用針以治之哉是使鳧雁摯擊牛羊搏噬無以異也雖有其方猶不免殘害之疾余今採其要約以為肘後救卒三卷率多易得之藥其不獲已須買之者亦皆賤價草石所在皆有兼之以灸灸但言其分寸不名孔穴凡人覽之可了其所用或不出乎垣籬之內顧眄可具苟能信之庶免橫禍焉世俗苦於貴遠賤近是古非今恐見此方無黃帝倉公和鵲逾跗之目不能採用安可強乎華陽隱居補闕肘後百一方序太歲庚辰隱居曰余宅身幽嶺迄將十載雖每植德施功多止一時之設可以傳方遠裔者莫過於撰述見葛氏肘後救卒殊足申一隅之思夫生人所為大患莫急於疾疾而不治猶救火而不以水也今輦掖左右藥師易尋郊郭之外已似難值況窮村迥野遙山絶浦其間枉夭安可勝言方術之書卷軸徒煩拯濟殊寡欲就披覽迷惑多端抱朴此制實為深益然尚闕漏未盡輒更採集補闕凡一百一首以朱書甄別為肘後百一方於雜病單治略為周遍矣昔應璩為百一詩以針規心行今余撰此蓋欲衛輔我躬且佛經云人用四大成身一大輒有一百一病是故深宜自想上自通人下達衆庶莫不各加繕寫而究括之余又別撰效驗方五卷具論諸病證徒因藥變通而並是大治非窮居所資若華軒鼎室亦宜修省耳葛序云可以施於貧家野居然亦不止如是今搢紳君子若常處間佚乃可披檢方書或從祿外邑將命遐徵或宿直禁門晨宵隔絶或急速戎陳城柵嚴阻忽遇疾倉卒唯拱手相看曷若探之囊笥則可庸豎成醫故備論證候使曉然不滯一披條領無使過差也尋葛氏舊方至今已二百許年播於海內因而齊者其效實多余今重以該要庶亦傳之千祀豈止於空衛我躬乎舊方都有八十六首檢其四蛇兩犬不假殊題喉舌之間亦非異處入冢御氣不足專名雜治一條猶是諸病部類強致殊分覆成失例今乃配合為七十九首於本文究具都無忖減復添二十二首或因葛一事增構成篇或補葛所遺準文更撰具如後録詳悉自究先次比諸病又不從類遂具勞覆在傷寒前霍亂置耳目後陰易之事乃出雜治中兼題與篇名不盡相符卒急之時難於尋檢今亦復其銓次庶歷然易曉其解散腳弱虛勞渴痢發背嘔血多是貴勝之疾其傷寒中風診候最難分別皆應取之於脈豈凡庸能究今所載諸方皆灼然可用但依法施治無使違逆其癰疽金瘡形變甚衆自非具方未易根盡其婦女之病小兒之病並難治之方法不少亦載其綱要云凡此諸方皆是撮其樞要或名醫垂記或纍世傳良或博聞有驗或自用得力故復各題祕要之説以避文繁又用藥有舊法亦不復假事事詮詔今通立定格共為成準凡服藥不言先食者皆在食前應食後者自各言之凡服湯云三服再服者要袍山源涯味或疏或數足令勢力相及毒利藥皆須空腹補瀉其間自可進粥凡散日三者當取旦中暮進之四五服則一日之中量時而分均也凡下丸散不云酒水飲者本方如此而別説用酒水飲則是可通用三物服也凡云分等即皆是丸散隨病輕重所須多少無定銖兩三種五種皆分均之分兩凡云丸散之若干分兩者是品諸藥宜多宜少之分兩非必止於若干分兩假今日服三方寸匕須瘥止是三五兩藥耳凡云末之是搗篩如法㕮咀者皆細切之凡云湯煮取三升分三服皆絞去滓而後酌量也字方中用鳥獸屎作矢字尿作溺字牡鼠亦作雄字乾作干字凡云錢匕者以大錢上全抄之若云半錢則是一錢抄取一邊爾並用五銖錢也方寸匕即用方一寸抄之可也刀圭準如兩大豆炮熬炙洗治諸藥凡用半夏皆湯洗五六度去滑附子烏頭炮去皮有生用者隨方言之礬石熬令汁盡椒皆出汗麥門冬皆去心丸散用膠皆炙巴豆皆去心皮熬有生用者隨而言之杏人去尖皮熬生用者言之葶藶皆熬皂莢去皮子藜蘆枳殼甘草皆炙大棗梔子擘破巴豆桃杏仁之類皆別研搗如膏乃和之諸角皆屑之麻黃皆去節凡湯中用芒硝阿膠飴糖皆絞去滓納湯中更微煮令消紅雪朴硝等皆狀此而入藥也用麻黃即去節先煮三五沸掠去沫後乃入余藥凡如上諸法皆已具載在余所撰本草上卷中今之人有此肘後百一方者未必得見本草是以復疏方中所用者載之此事若非留心藥術不可盡知則安得使之不僻繆也案病雖千種大略只有三條而已一則腑臟經絡因邪生疾二則四肢九竅內外交媾三則假為他物橫來傷害此三條者今各以類而分別之貴圖倉卒之時披尋簡易故也今以內疾為上卷外發為中卷他犯為下卷具列之云上卷三十五首治內病中卷三十五首治外發病下卷三十一首治為物所苦病鹿鳴山續古序觀夫古方藥品分兩灸穴分寸不類者蓋古今人體大小或異臟腑血脈亦有差焉請以意酌量藥品分兩古序已明取所服多少配之或一分為兩或二銖為兩以盞當升可也如中卷末紫丸方代赭赤石脂各一兩巴豆四十杏仁五十枚小兒服一麻子百日者一小豆且多矣若兩用二銖四纍巴豆四杏仁五枚可療十數小兒此其類也灸之分寸取其人左右中指中節可也其使有毒狼虎性藥乃急救性命者也或遇發毒急掘地作小坑以水令滿熟攪稍澄飲水自解石為地漿特加是説於品題之後爾附廣肘後方序昔伊尹著湯液之論周公設醫師之屬皆所以拯救民疾俾得以全生而盡年也然則古之賢臣愛其君以及其民者蓋非特生者遂之而已人有疾病坐視其危苦而無以救療之亦其心有所不忍也仰惟國家受天成命統一四海主上以仁覆天下輕稅損役約法省刑蠲積負柔遠服專務以德養民故人臣奉承於下亦莫不以體國愛民為心惟政府內外宗公協同輔翼以共固天保無疆之業其心則又甚焉於斯時也蓋民罹兵火獲見太平邊境寧而盜賊息矣則人無死於鋒鏑之慮刑罰清而狴犴空矣則人無死於桎梏之憂年穀豐而蓄積富矣則人無死於溝壑之患其所可虞者獨民之有疾病夭傷而已思亦有以救之其不在於方書矣乎然方之行於世者多矣大編廣集奇藥群品自名醫貴胄或不能以兼通而卒具況可以施於民庶哉於是行省乃得乾統間所刊肘後方善本即葛洪所謂皆單行徑易約而已驗籬陌之間顧眄皆藥家有此方可不用醫者也其書經陶隱居增修而益完矣既又得唐慎微證類本草其所附方皆洽見精取切於救治而卷帙尤為繁重且方隨藥著檢用卒難乃復摘録其方分以類例而附於肘後隨證之下目之曰附廣肘後方下監俾更加讎次且為之序而刊行之方雖簡要而該病則衆藥多易求而論效則遠將使家自能醫人無夭橫以溥濟斯民於仁壽之域以上廣國家博施愛物之德其為利豈小補哉皇統四年十月戊子儒林郎汴京國子監博士楊用道謹序
